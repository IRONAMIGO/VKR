services:
  backend:
    build:
      context: ./back
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - CORS_URL=http://0.0.0.0:8080
    volumes:
      # Монтирование папки с моделями
      - ./back/models:/app/models:ro
      # Монтирование папки с данными
      - ./back/data:/app/data
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./front
    ports:
      - "80:8080"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
